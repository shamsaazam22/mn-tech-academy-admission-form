<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission form</title>
</head>
<body>
    <h1>MN Tech Academy Admission Form</h1>
    <form>
        <fieldset>

         <legend>Student Personal information</legend>

            <label>Full name</label> 
           <input type ="text"  placeholder="Enter your full name ">

           <br><br>

           <label>Father name</label>
           <input type ="text" placeholder ="Enter father name">

           <br><br>

           <label>CNIC/ B-Form Number</label>
           <input type = "number" placeholder ="Enter your CNIC/ B-Form Number">

           <br><br>

           <label>Date of Birth</label>
           <input type ="data" placeholder="Enter your date of birth">

           <br><br>

           <label>Geneder</label>
           <input type="radio" name="gender"> Male
           <input type="radio" name="gender"> Female

           <br><br>

           <label>Email Adress</label>
           <input type = "email" placeholder="Enter your email adress">

           <br><br>

           <label>Phone Number</label> 
           <input type = "tel" placeholder="Enter your phone number">

           <br><br>

           <label>Address</label>
           <textarea placeholder="Enter your address"></textarea>

           <br><br>

           <label>City</label>
           <select>
           <option>Lahore</option>
           <option>Karachi</option>
           <option>Islamabad</option>
           </select>

        </fieldset>

        <fieldset>

           <legend>Academic Information</legend>

           <label>Last Qualification</label>
           <input type="text" placeholder="Enter qualification">

           <br><br>

           <label>School / College Name</label>
           <input type="text" placeholder="Enter school or college name">

           <br><br>

           <label>Percentage / Grade</label>
           <input type="text" placeholder="Enter percentage or grade">

           <br><br>

           <label>Passing Year</label>
           <input type="number" placeholder="Enter passing year">
           

        </fieldset>

        <fieldset>

            <legend>Course Selection</legend>
            <label>Course Name </label>
            <select>
            <option>Web Development</option>
            <option>Graphic Designing</option>
            <option>Artificial Intelligence</option>
            </select>
            <br><br>
            <label>Course Timing</label>
            <input type="radio" name="timing"> Morning
            <input type="radio" name="timing"> Evening
            <br><br>
             <label>Mode</label>
             <input type="radio" name="mode"> Online
             <input type="radio" name="mode"> Physical
             <br><br>

        </fieldset>

        <fieldset>

        <legend>Guardian Information</legend>

        <label>Guardian Name</label>
        <input type="text" placeholder="Enter guardian name">

        <br><br>

        <label>Relation</label>
        <input type="text" placeholder="Enter relation">

        <br><br>

        <label>Guardian Contact Number</label>
        <input type="number" placeholder="Enter contact number">

        <br><br>

        <label>Guardian Occupation</label>
        <input type="text" placeholder="Enter occupation">

        <br><br>

        </fieldset>
        <fieldset>
        <legend>Account Information</legend>
        <label>Username</label>
        <input type="text" placeholder="Enter username">

        <br><br>

        <label>Password</label>
        <input type="password" placeholder="Enter password">

        <br><br>

        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm password">

        <br><br>
        </fieldset>
        <fieldset>

        <legend>Additional Elements</legend>

        <label>Upload Student Picture</label>
        <input type="file">

        <br><br>

        <label>Upload Documents</label>
        <input type="file">

        <br><br>

        <label>Message / Notes</label>

        <textarea rows="4" cols="30" placeholder="Write your message"></textarea>

        <br><br>

        <input type="checkbox">
        <label>I Agree to Terms & Conditions</label>

        <br><br>

        <input type="submit">

        <input type="reset">

        </fieldset>

        </fieldset>
</form>
</body>
</html>
